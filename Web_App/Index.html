<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧手機保管箱監控系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
      :root {
        --color-light-bg-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        --color-dark-bg-gradient: linear-gradient(135deg, #1f2937 0%, #0f172a 100%);
        
        --color-light-glass-bg: rgba(255, 255, 255, 0.65);
        --color-dark-glass-bg: rgba(30, 41, 59, 0.85);
        
        --color-light-text-main: #111827;
        --color-dark-text-main: #f9fafb;
        --color-light-sub: #4b5563;
        --color-dark-sub: #9ca3af;

        --color-light-border: 1px solid rgba(255, 255, 255, 0.8);
        --color-dark-border: 1px solid rgba(255, 255, 255, 0.1);
        
        --shadow-base: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        --shadow-dark: 0 4px 16px 0 rgba(0, 0, 0, 0.4);
        
        --status-ok: #10b981; 
        --status-waiting: #f59e0b; 
        --status-timeout: #ef4444;
      }
      
      body {
        --bg: var(--color-light-bg-gradient); --glass: var(--color-light-glass-bg);
        --text: var(--color-light-text-main); --text-sub: var(--color-light-sub);
        --border: var(--color-light-border); --shadow: var(--shadow-base);
        --badge-closed-bg: #d1d5db; --badge-closed-text: #374151;
        --slot-bg: rgba(255, 255, 255, 0.4); --slot-border: 1px solid rgba(255, 255, 255, 0.5);
        --slot-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        --danger-bg: rgba(254, 202, 202, 0.7); --danger-text: #7f1d1d;
        --success-bg: rgba(167, 243, 208, 0.6); --success-text: #064e3b;

        background: var(--bg); color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; padding: 24px 20px;
        display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        transition: background 0.3s, color 0.3s;
      }
      
      body.dark-mode {
        --bg: var(--color-dark-bg-gradient); --glass: var(--color-dark-glass-bg);
        --text: var(--color-dark-text-main); --text-sub: var(--color-dark-sub);
        --border: var(--color-dark-border); --shadow: var(--shadow-dark);
        --badge-closed-bg: rgba(75, 85, 99, 0.8); --badge-closed-text: #f3f4f6;
        --slot-bg: rgba(255, 255, 255, 0.05); --slot-border: 1px solid rgba(255, 255, 255, 0.05);
        --slot-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        --danger-bg: rgba(185, 28, 28, 0.5); --danger-text: #fca5a5;
        --success-bg: rgba(6, 78, 59, 0.5); --success-text: #6ee7b7;
      }

      .header-container { width: 100%; max-width: 480px; margin-bottom: 24px; position: relative; display: flex; justify-content: center; align-items: center; }
      h1 { font-size: 1.6rem; margin: 0; font-weight: 800; color: var(--text); text-align: center; flex-grow: 1; }
      
      .icon-btn {
        background: var(--glass); border: var(--border); box-shadow: var(--shadow); color: var(--text);
        width: 36px; height: 36px; border-radius: 50%;
        font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        position: absolute; transition: 0.2s;
      }
      .icon-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.8); }
      #theme-toggle { right: 0; }
      #setting-btn { right: 45px; }

      .glass-card {
        background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        border: var(--border); box-shadow: var(--shadow); border-radius: 20px; transition: 0.3s;
      }
      
      .status-bar { padding: 14px 20px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; font-weight: 500; color: var(--text-sub); width: 100%; max-width: 480px; box-sizing: border-box; }
      .live-indicator { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; display: inline-block; }
      
      /* 呼吸燈動畫 */
      .live-indicator.ok { background: var(--status-ok); box-shadow: 0 0 10px var(--status-ok); animation: pulse 2s infinite; }
      .live-indicator.waiting { background: var(--status-waiting); box-shadow: 0 0 10px var(--status-waiting); animation: pulse 2s infinite; }
      .live-indicator.timeout { background: var(--status-timeout); box-shadow: 0 0 10px var(--status-timeout); animation: pulse 2s infinite; }
      
      .time-container { display: flex; align-items: center; white-space: nowrap; flex-shrink: 0; }
      #last-update-time { font-family: monospace; font-size: 0.95rem; letter-spacing: 0.5px; color: var(--text-sub); }

      .door-panel {
        width: 100%; max-width: 480px; margin: 0 auto 16px auto; padding: 14px 24px; min-height: 70px; 
        display: flex; align-items: center; justify-content: space-between; 
        box-sizing: border-box; cursor: pointer; position: relative;
        outline: none; -webkit-tap-highlight-color: transparent; border: 2px solid transparent; 
      }
      .door-panel:active { transform: scale(0.98); }
      .door-left { display: flex; flex-direction: column; justify-content: center; }
      .door-title { font-size: 0.95rem; color: var(--text-sub); font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
      #lock-icon { font-size: 1.4rem; }

      .badge { padding: 6px 14px; border-radius: 30px; font-weight: 600; font-size: 0.9rem; }
      .badge.open { background: rgba(16, 185, 129, 0.2); color: #064e3b; border: 1px solid rgba(16, 185, 129, 0.3); }
      .badge.closed { background: var(--badge-closed-bg); color: var(--badge-closed-text); border: 1px solid rgba(0,0,0,0.05); }

      .auth-user { text-align: right; }
      .user-name { font-weight: 800; font-size: 1.2rem; color: var(--text); }
      .user-id { font-size: 0.8rem; color: var(--text-sub); margin-top: 2px; }

      .info-row { width: 100%; max-width: 480px; display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
      .info-card { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; min-width: 100px; }
      .panel-title { font-size: 0.9rem; font-weight: 600; color: var(--text-sub); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
      .temp-value { font-size: 2rem; font-weight: 800; color: var(--text); line-height: 1;}
      .temp-unit { font-size: 1rem; font-weight: 600; color: var(--text-sub); margin-left: 4px; }

      .grid-header { width: 100%; max-width: 480px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 4px; }
      .grid-title { font-size: 1.05rem; font-weight: 700; color: var(--text); }
      .legend { font-size: 0.8rem; display: flex; gap: 12px; color: var(--text-sub); }
      .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; width: 100%; max-width: 480px; margin-bottom: 40px; }
      .slot { aspect-ratio: 1; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--slot-bg); border: var(--slot-border); box-shadow: var(--slot-shadow); transition: 0.3s; backdrop-filter: blur(4px); }
      .slot-num { font-size: 1.25rem; font-weight: 700; margin-bottom: 2px; color: var(--text); }
      .slot-status { font-size: 0.75rem; font-weight: 600; opacity: 0.9; }
      .slot.active { background: var(--danger-bg); } .slot.active .slot-num, .slot.active .slot-status { color: var(--danger-text); }
      .slot.empty { background: var(--success-bg); } .slot.empty .slot-num, .slot.empty .slot-status { color: var(--success-text); }

      .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
      .modal { background: #fff; width: 90%; max-width: 380px; border-radius: 16px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); color: #333; }
      .time-list { max-height: 250px; overflow-y: auto; margin: 15px 0; border: 1px solid #eee; padding: 10px; border-radius: 8px;}
      .time-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: center;}
      .time-input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 1.2rem; flex: 1; text-align: center; color: #374151;}
      .btn-del { background: #fee2e2; color: #b91c1c; border: none; padding: 0 12px; height: 38px; border-radius: 6px; cursor: pointer; }
      .btn-add { background: #d1fae5; color: #047857; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
      .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;}
      .btn-save { background: #3b82f6; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
      .btn-cancel { background: #f3f4f6; color: #4b5563; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }

      @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
      @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
      .danger-alert { animation: shake 0.5s; background-color: rgba(239, 68, 68, 0.2) !important; border-color: var(--status-timeout) !important; }
      .danger-text { color: var(--status-timeout) !important; }

      @media (min-width: 768px) {
        .header-container, .status-bar, .info-row, .grid-header, .door-panel, .grid-container { max-width: 960px; }
        .grid-container { grid-template-columns: repeat(10, 1fr); gap: 16px; }
        body { padding: 40px 24px; }
        h1 { font-size: 1.8rem; }
      }
    </style>
  </head>
  <body class="light-mode">
    <div class="modal-overlay" id="setting-modal">
      <div class="modal">
        <h3 style="margin-top:0; border-bottom:1px solid #eee; padding-bottom:10px;">自動解鎖排程</h3>
        <div class="time-list" id="time-list"></div>
        <button class="btn-add" onclick="addTimeSlot()"><i class="fas fa-plus-circle"></i> 新增時間</button>
        <div class="modal-actions">
           <button class="btn-cancel" onclick="closeModal('setting-modal')">取消</button>
           <button class="btn-save" onclick="saveSettings()">儲存</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="pin-modal">
      <div class="modal">
        <h3 style="margin-top:0; border-bottom:1px solid #eee; padding-bottom:10px;">安全驗證</h3>
        <p style="text-align:center; color:#4b5563; margin-bottom:20px;">請輸入 4 位數 PIN 碼：</p>
        <div style="display:flex; justify-content:center; margin-bottom:20px;">
            <input type="password" id="pin-input" class="time-input" maxlength="4" style="width:150px; font-size:2rem; letter-spacing:8px; text-align:center;">
        </div>
        <div class="modal-actions">
           <button class="btn-cancel" onclick="closePinModal()">取消</button>
           <button class="btn-save" onclick="verifyPin()">確認</button>
        </div>
      </div>
    </div>

    <div class="header-container">
      <h1>智慧手機保管箱監控系統</h1>
      <button id="setting-btn" class="icon-btn" onclick="openSettings()" title="排程設定"><i class="fas fa-clock"></i></button>
      <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
    </div>
    
    <div class="status-bar glass-card">
      <div style="display:flex; align-items:center; flex: 1 1 auto; min-width: 0;">
          <span id="live-indicator" class="live-indicator waiting" style="flex-shrink: 0;"></span>
          <span id="status-text" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 5px;">正在等待訊號...</span>
      </div>
      <div class="time-container">
        <span class="time-label">最後連線：</span>
        <span id="last-update-time">--</span>
      </div>
    </div>

    <div id="panel-box" class="glass-card door-panel" onclick="askUnlock()" title="點擊解鎖">
      <div class="door-left">
         <div class="door-title">
             <span id="lock-icon">🔒</span> &nbsp;門禁狀態
         </div>
         <div id="valve-badge" class="badge closed" style="width: fit-content;">讀取中...</div>
      </div>
      
      <div id="auth-display" class="auth-user">
         <div class="user-name" id="user-name">--</div>
         <div class="user-id" id="user-id-display">--</div>
      </div>
    </div>

    <div class="info-row">
      <div id="air-card" class="glass-card info-card">
        <div class="panel-title"><i id="air-icon" class="fas fa-wind"></i> 空氣品質</div>
        <div id="air-display" class="temp-value">--</div>
      </div>
      <div class="glass-card info-card">
        <div class="panel-title"><i class="fas fa-temperature-half"></i> 機箱溫度</div>
        <div style="display:flex; align-items:baseline;">
            <span id="temp-display" class="temp-value">--</span>
            <span class="temp-unit">°C</span>
        </div>
      </div>
      <div class="glass-card info-card">
        <div class="panel-title"><i class="fas fa-tint"></i> 機箱濕度</div>
        <div style="display:flex; align-items:baseline;">
            <span id="hum-display" class="temp-value">--</span>
            <span class="temp-unit">%</span>
        </div>
      </div>
    </div>

    <div class="grid-header">
      <div class="grid-title">保管箱即時狀態</div>
      <div class="legend"><div style="display:flex; align-items:center;"><span class="dot" style="color:#ef4444; font-size:1.1rem; margin-right:4px;">🔴</span>已放置</div><div style="display:flex; align-items:center;"><span class="dot" style="color:#10b981; font-size:1.1rem; margin-right:4px;">🟢</span>空置</div></div>
    </div>
    <div class="grid-container" id="grid"></div>

    <script>
      const THEME_KEY = 'monitor_theme';
      let currentTheme = 'light';
      const pageLoadTime = Date.now(); 
      const TIMEOUT_MS = 90 * 1000;
      let isPinVerified = false; 
      let pendingCallback = null;

      function createGrid(){const grid=document.getElementById('grid');grid.innerHTML='';for(let i=1;i<=20;i++){let div=document.createElement('div');div.className='slot empty';div.id='slot-'+i;div.innerHTML=`<div class="slot-num">${i}</div><div class="slot-status">空置</div>`;grid.appendChild(div);}}
      
      function initializeTheme(){
          const storedTheme=localStorage.getItem(THEME_KEY);
          const prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
          const initialTheme=storedTheme||(prefersDark?'dark':'light');
          setTheme(initialTheme,false);
          document.getElementById('theme-toggle').addEventListener('click',toggleTheme);
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',(e)=>{
              if(!localStorage.getItem(THEME_KEY)){setTheme(e.matches?'dark':'light',false);}
          });
      }
      function setTheme(theme,save=true){
          currentTheme=theme;
          const body=document.body;
          const toggleIcon=document.getElementById('theme-toggle').querySelector('i');
          if(theme==='dark'){
              body.classList.add('dark-mode'); body.classList.remove('light-mode');
              toggleIcon.className='far fa-sun';
          }else{
              body.classList.add('light-mode'); body.classList.remove('dark-mode');
              toggleIcon.className='fas fa-moon';
          }
          if(save)localStorage.setItem(THEME_KEY,theme);
      }
      function toggleTheme(){
          const newTheme=currentTheme==='light'?'dark':'light';
          setTheme(newTheme,true);
      }

      function performWithAuth(callback) {
          if (isPinVerified) { callback(); return; }
          pendingCallback = callback;
          document.getElementById('pin-input').value = ''; 
          document.getElementById('pin-modal').style.display = 'flex';
          setTimeout(() => document.getElementById('pin-input').focus(), 100); 
      }

      function closePinModal() {
          document.getElementById('pin-modal').style.display = 'none';
          pendingCallback = null;
      }

      function verifyPin() {
          const pin = document.getElementById('pin-input').value;
          if (pin === "0731") { //設定PIN碼
              isPinVerified = true;
              closePinModal();
              alert("✅ 驗證成功！");
              if (pendingCallback) pendingCallback();
          } else {
              alert("❌ PIN 碼錯誤！");
              document.getElementById('pin-input').value = '';
              document.getElementById('pin-input').focus();
          }
      }

      document.getElementById('pin-input').addEventListener('keypress', function (e) {
          if (e.key === 'Enter') verifyPin();
      });

      function askUnlock() {
          performWithAuth(() => {
              const lockIcon = document.getElementById('lock-icon');
              const originalEmoji = lockIcon.innerText;
              lockIcon.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; 
              document.getElementById('panel-box').onclick = null;

              google.script.run.withSuccessHandler(function() {
                  alert("✅ 指令已發送！");
                  lockIcon.innerText = originalEmoji; 
                  document.getElementById('panel-box').onclick = askUnlock;
                  fetchData();
              }).triggerRemoteUnlock();
          });
      }

      function openSettings() {
          performWithAuth(() => {
              document.getElementById('setting-modal').style.display = 'flex';
              document.getElementById('time-list').innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-sub);">讀取中...</div>';
              google.script.run.withSuccessHandler(renderTimeList).getScheduleList();
          });
      }

      function closeModal(id) { document.getElementById(id).style.display = 'none'; }
      function renderTimeList(times) {
        const container = document.getElementById('time-list'); container.innerHTML = '';
        if(times.length===0) container.innerHTML='<div style="text-align:center;color:var(--text-sub); padding:10px;">目前無排程</div>';
        times.forEach(t => addTimeSlot(t));
      }
      function addTimeSlot(value = '') {
        const container = document.getElementById('time-list');
        if(container.innerText.includes("無排程") || container.innerText.includes("讀取中")) 
           container.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'time-item';
        div.innerHTML = `<input type="time" class="time-input" value="${value}"><button class="btn-del" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>`;
        container.appendChild(div);
      }
      function saveSettings() {
        const modal = document.getElementById('setting-modal');
        const realInputs = modal.querySelectorAll('input[type="time"]');
        const times = [];
        realInputs.forEach(input => { if(input.value) times.push(input.value); });
        const btn = document.querySelector('.btn-save');
        const oldText = btn.innerText;
        btn.innerText = "儲存中...";
        google.script.run.withSuccessHandler(() => {
           alert("✅ 設定已儲存！");
           btn.innerText = oldText;
           closeModal('setting-modal');
        }).saveScheduleList(times);
      }

      function fetchData() { 
        google.script.run
          .withSuccessHandler(updateUI)
          .withFailureHandler(function(err){
             document.getElementById('status-text').innerText = "連線失敗";
             document.getElementById('live-indicator').className = "live-indicator timeout";
          })
          .getData(); 
      }

      function updateUI(data) {
        const timeDisplay = document.getElementById('last-update-time');
        const statusText = document.getElementById('status-text');
        const indicator = document.getElementById('live-indicator');
        
        if (data.fullDateTime && data.fullDateTime !== "--") {
            timeDisplay.innerText = data.fullDateTime; 
            
            if (data.secondsAgo <= 90) {
                statusText.innerText = "系統連線成功";
                indicator.className = "live-indicator ok";
            } 
            else {
                const timeSinceOpen = Date.now() - pageLoadTime;
                
                if (timeSinceOpen < TIMEOUT_MS) {
                    statusText.innerText = "正在等待連線...";
                    indicator.className = "live-indicator waiting";
                } else {
                    statusText.innerText = "連線逾時 (超過90秒)";
                    indicator.className = "live-indicator timeout";
                }
            }
        } else {
            statusText.innerText = "等待資料同步...";
            indicator.className = "live-indicator waiting";
        }

        document.getElementById('temp-display').innerText = data.temp;
        document.getElementById('hum-display').innerText = data.hum;
        
        const smk = parseInt(data.smoke || 0);
        const air = document.getElementById('air-display');
        const airCard = document.getElementById('air-card');
        const airIcon = document.getElementById('air-icon');

        airCard.classList.remove('danger-alert'); 

        if (smk == -1) { 
            air.innerText="校正中"; air.style.color="#00CED1"; airIcon.className = "fas fa-sync fa-spin"; airIcon.style.color = "#00CED1";
        } else if(smk >= 100){ 
            air.innerText="疑似偵測到煙霧"; air.style.color="#ef4444"; airCard.classList.add("danger-alert"); airIcon.className = "fas fa-fire"; airIcon.style.color = "var(--danger-text)";
        } else if(smk >= 80){ 
            air.innerText="不佳"; air.style.color="orange"; airIcon.className = "fas fa-smog"; airIcon.style.color = "orange";
        } else if(smk >= 50){ 
            air.innerText="普通"; air.style.color="#FFD700"; airIcon.className = "fas fa-wind"; airIcon.style.color = "#FFD700";
        } else { 
            air.innerText="良好"; air.style.color="#10b981"; airIcon.className = "fas fa-wind"; airIcon.style.color = "var(--status-ok)";
        }

        for(let i=0;i<20;i++){
           let s = document.getElementById('slot-'+(i+1));
           if(data.pins[i]==="Yes"){ s.className='slot active'; s.querySelector('.slot-status').innerText='已放';}
           else { s.className='slot empty'; s.querySelector('.slot-status').innerText='空置';}
        }

        const badge = document.getElementById('valve-badge');
        const box = document.getElementById('panel-box');
        const user = document.getElementById('user-name');
        const uid = document.getElementById('user-id-display');
        const lockIcon = document.getElementById('lock-icon');
        
        let isEmergency = (smk>=100) || (data.user && data.user.includes("EMERGENCY"));
        
        if(data.valve==="開啟"){
            badge.innerText="已解鎖 (OPEN)"; badge.className="badge open";
            if(!lockIcon.innerHTML.includes("spinner")) lockIcon.innerText = "🔓";
            
            box.style.borderColor = isEmergency ? "#ef4444" : "#10b981";
            box.style.boxShadow = isEmergency ? "0 0 15px rgba(239,68,68,0.3)" : "0 0 15px rgba(16,185,129,0.3)";
            
            if(data.user) {
               let parts = data.user.split('|');
               user.innerText = parts[0] === "System" ? "系統自動" : (parts[0]==="Remote"?"遠端解鎖":parts[0]);
               uid.innerText = parts[1] ? "UID: "+parts[1] : "";
            }
        } else {
            badge.innerText="已上鎖 (LOCKED)"; badge.className="badge closed";
            if(!lockIcon.innerHTML.includes("spinner")) lockIcon.innerText = "🔒";
            
            box.style.borderColor = "transparent";
            box.style.boxShadow = ""; 
            
            user.innerText = ""; uid.innerText = "";
        }
      }

      window.onload = function() {
        createGrid();
        initializeTheme();
        fetchData();
        setInterval(fetchData, 1000);
      };
    </script>
  </body>
</html>
